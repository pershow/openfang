# NOTE: The GHCR image (ghcr.io/rightnow-ai/openparlant) is not yet public.
# For now, build from source using `docker compose up --build`.
# See: https://github.com/RightNow-AI/openparlant/issues/12

version: "3.8"
services:
  openparlant:
    build: .
    # image: ghcr.io/rightnow-ai/openparlant:latest  # Uncomment when GHCR is public
    ports:
      - "4200:4200"
    volumes:
      - openparlant-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    restart: unless-stopped

volumes:
  openparlant-data:
