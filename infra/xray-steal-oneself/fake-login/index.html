<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in</title>
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --text: #e6edf3; --muted: #8b949e; --accent: #3b82f6; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .card { width: 100%; max-width: 360px; padding: 2rem; background: var(--card); border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35); border: 1px solid rgba(255,255,255,.06); }
    h1 { margin: 0 0 .5rem; font-size: 1.25rem; font-weight: 600; }
    p.sub { margin: 0 0 1.5rem; font-size: .875rem; color: var(--muted); }
    label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .35rem; }
    input { width: 100%; padding: .65rem .75rem; margin-bottom: 1rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,.12); background: rgba(0,0,0,.25); color: var(--text); font-size: .9rem; }
    button { width: 100%; padding: .7rem; border: none; border-radius: 8px; background: var(--accent);
      color: #fff; font-weight: 600; cursor: pointer; font-size: .9rem; }
    .hint { margin-top: 1rem; font-size: .75rem; color: var(--muted); text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Placeholder page for local TLS (REALITY dest). Not a real account system.</p>
    <form action="#" method="post" onsubmit="return false;">
      <label for="u">Username</label>
      <input id="u" name="u" type="text" autocomplete="username" />
      <label for="p">Password</label>
      <input id="p" name="p" type="password" autocomplete="current-password" />
      <button type="submit">Continue</button>
    </form>
    <p class="hint">Static decoration only — no credentials are processed.</p>
  </div>
</body>
</html>
